baseURL: https://kimi2000nb.github.io/
title: kimi2000nb 的技术博客

# cSpell:ignore goldmark github hugo readingtime docsy subdir lastmod pygments linenos catmullrom norsk gu slugorcontentbasename

# Language settings

contentDir: content/en
defaultContentLanguage: en
defaultContentLanguageInSubdir: false
enableMissingTranslationPlaceholders: true

enableRobotsTXT: true
enableGitInfo: false

taxonomies:
  tag: tags
  category: categories

pygmentsCodeFences: true
pygmentsUseClasses: false
pygmentsUseClassic: false
pygmentsStyle: tango

mediaTypes:
  text/redirects:
    delimiter: ''

outputFormats:
  redirects:
    baseName: _redirects
    isPlainText: true
    mediaType: text/redirects
    root: true

permalinks:
  blog: /:section/:year/:month/:day/:slugorcontentbasename

imaging:
  resampleFilter: CatmullRom

languages:
  en:
    label: English
    title: kimi
    params:
      description: A Docsy example site
  no:
    label: Norsk
    contentDir: content/no
    title: kimi
    params:
      description: Docsy er operativsystem for skyen
      time_format_default: 02.01.2006
      time_format_blog: 02.01.2006
  fa:
    direction: rtl
    label: 'فارسی (Persian)'
    contentDir: content/fa
    title: 'اسناد گلدی'
    params:
      description: 'یک نمونه برای پوسته داکسی'
      time_format_default: 2006.01.02
      time_format_blog: 2006.01.02

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango
    noClasses: false

outputs:
  home: [HTML, RSS, redirects]
  section: [HTML, RSS]

params:
  taxonomy:
    taxonomyCloud: [tags, categories]
    taxonomyCloudTitle: [Tag Cloud, Categories]
    taxonomyPageHeader: [tags, categories]

  privacy_policy: https://policies.google.com/privacy
  version_menu: Releases
  archived_version: false
  version: 0.15.1-dev
  github_repo: “”
  github_project_repo: https://github.com/google/docsy
  github_branch: main
  gcs_engine_id: d72aa9b2712488cc3
  offlineSearch: false
  prism_syntax_highlighting: false

  copyright:
    authors: >-
      Docsy Authors & Kimi | [CC BY 4.0](https://creativecommons.org/licenses/by/4.0) |
    from_year: 2018
    to_year: present

  ui:
    breadcrumb_disable: false
    navbar_logo: true
    navbar_translucent_over_cover_disable: false
    sidebar_menu_foldable: true
    sidebar_menu_compact: false
    sidebar_search_disable: false
    showLightDarkModeMenu: true
    feedback:
      enable: true
      yes: >-
        Glad to hear it! Please <a
        href="https://www.facebook.com/kimi.yong.807577#">tell us how we
        can improve</a>.
      no: >-
        Sorry to hear that. Please <a
        href="https://www.facebook.com/kimi.yong.807577#">tell us how we
        can improve</a>.
    readingtime:
      enable: false

  mainBranchPreviewURL: https://main--goldydocs.netlify.app/
  btn-lg: class="btn btn-lg btn-{1}" role="button"
  FA: <i class="fa-{1} fa-{2} text-{3} px-1"></i>

  links:
    user:
      - name: smartstitch-official
        url: https://support@smartstitch-official.com
        icon: fa fa-envelope
        desc: Discussion and help from your fellow users
      - name: Facebook
        url: https://www.facebook.com/groups/5787914854644031
        icon: fab fa-facebook
        desc: Follow us on Facebook to get the latest news!
      - name: YouTube
        url: https://www.youtube.com/@SmartstitchEmbroideryMachine
        icon: fab fa-youtube
        desc: Follow us on YouTube to get the latest videos!

    developer:
      - name: YouTube
        url: https://www.youtube.com/@Kimi-m5u
        icon: fab fa-youtube
        desc: Visit our YouTube channel for tutorials and updates!


security:
  funcs:
    getenv: ['^HUGO_', '^CI$', '^BRANCH$', '^BUILD_ID$', '^NETLIFY$', '^DEPLOY_PRIME_URL$', '^CONTEXT$', '^COMMIT_REF$', '^DEPLOY_ID$', '^REVIEW_ID$', '^REPOSITORY_URL$', '^DEPLOY_URL$']

module:
  hugoVersion:
    extended: true
    min: 0.158.0
  imports:
    - path: github.com/google/docsy/theme
      disable: false
